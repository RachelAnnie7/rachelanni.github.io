repository               : "rachelanni/rachelanni.github.io" # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes"

#teaser                   : "assets/img/unsplash-gallery-image-4.jpg" # path of fallback teaser image, e.g. "/assets/images/500x300.png"
#logo                     : "assets/img/unsplash-image-11.jpg" # path of logo image to display in the masthead, e.g. "/assets/images/88x88.png"
#masthead_title           : "" # overrides the website title displayed in the masthead, use " " for no title
#breadcrumbs              : "false" # true, false (default)
#words_per_minute         : "200"
#enable_copy_code_button  : "false" # true, false (default)
#copyright                : # "copyright" name, defaults to site.title
#copyright_url            : # "copyright" URL, defaults to site.url
#comments:
 # provider               :  "utterances" # false (default), "disqus", "discourse", "facebook", "staticman", "staticman_v2", "utterances", "giscus", "custom"
  #disqus:
    #shortname            : https://help.disqus.com/customer/portal/articles/466208-what-s-a-shortname-
  #discourse:
    #server               : https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  #facebook:
    #https://developers.facebook.com/docs/plugins/comments
    #appid                :
    #num_posts            :  "5" # 5 (default)
    #colorscheme          :  "dark" # "light" (default), 
  #utterances:
    #theme                :  "github-dark" # "github-light" (default), 
    #issue_term           :  "pathname" # "pathname" (default)
  #giscus:
    #repo_id             : # Shown during giscus setup at https://giscus.app
    #category_name       : # Full text name of the category
    #category_id         : # Shown during giscus setup at https://giscus.app
    #discussion_term      :  "pathname" # "pathname" (default), "url", "title", "og:title"
    #reactions_enabled    :  "1'" # for enabled (default), '0' for disabled
    #theme                :  "github-dark" # "light" (default), "dark",  "transparent_dark", "preferred_color_scheme"
    #strict               :  "0" # 1 for enabled, 0 for disabled (default)
    #input_position       :  "bottom" # "top", "bottom" # The comment input box will be placed above or below the comments
    #emit_metadata        :  "0" # 1 for enabled, 0 for disabled (default) # https://github.com/giscus/giscus/blob/main/ADVANCED-USAGE.md#imetadatamessage
    #lang                 :  "en" # (default)
   # lazy                 :  "true" # true, false # Loading of the comments will be deferred until the user scrolls near the comments container.


# Site Settings
teaser                   : "assets/img/unsplash-image-11.jpg" # filename of teaser fallback teaser image placed in /images/, .e.g. "500x300.png"
breadcrumbs              : false # true, false (default)
words_per_minute         : 160
future                   : true
read_more                : "disabled" # if enabled, adds "Read more" links to excerpts
talkmap_link             : false      #change to true to add link to talkmap on talks page
comments:
  provider               : # false (default), "disqus", "discourse", "facebook", "google-plus", "staticman", "custom"
  disqus:
    shortname            :
  discourse:
    server               : # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    appid                :
    num_posts            : # 5 (default)
    colorscheme          : # "light" (default), "dark"
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages" # "master", "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601" # "iso8601" (default), "timestamp-seconds", "timestamp-milliseconds"
atom_feed:
  hide                   : false # true, false (default)
  path                   : # blank (default) uses feed.xml

